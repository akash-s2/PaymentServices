# ======================
# Server Configuration
# ======================
server.port=8082

# ======================
# H2 Database (file-based)
# ======================
spring.datasource.url=jdbc:h2:file:./data/payment;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ======================
# Order Service
# ======================
order.service.base-url=http://localhost:8081

# ======================
# Payment Simulator
# ======================
payment.simulator.success-rate=0.8

# Failure reason weights (relative, do not need to sum to 100)
payment.simulator.failure-reasons.INSUFFICIENT_FUNDS=30
payment.simulator.failure-reasons.CARD_EXPIRED=20
payment.simulator.failure-reasons.BANK_DECLINED=25
payment.simulator.failure-reasons.FRAUD_SUSPECTED=10
payment.simulator.failure-reasons.NETWORK_ERROR=15
